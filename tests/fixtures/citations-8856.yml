            {"datasetrec":{"DasID":8856,"Acronym":"2004_Gudena","StandardTitle":"Acoustic receiver array in the Gudena River, Denmark, from 2004-2006","OrigTitle":null,"OrigTitleLangID":null,"OrigTitleLangCode":null,"OrigTitleLang":null,"OrigTitleLangNL":null,"VersionName":null,"ContactEmail":null,"VersionDate":null,"VersionDay":null,"VersionMonth":null,"VersionYear":null,"SizeReference":null,"EngAbstract":"<p>The population of European silver eel (<i>Anguilla anguilla)</i> has declined tremendously in the last decades. The cause of this decline is unknown, and it is necessary to investigate the migratory behaviour and survival rates of silver eels during the reproductive migration in order to understand if the decline is related to factors acting during that migration. We estimated survival and progression rates of European silver eel migrating in the lower part of the River Gudenaa and during the first phase of the marine migration in the Randers Fjord in Denmark. &nbsp;Migration was monitored using an array of 14 Innovasea (VR2) acoustic receivers distributed accross 10 stations. Progression rate and mortality in the river, inner part of the fjord and outer part of the fjord were estimated.</p>","EngDescr":null,"OrigAbstract":null,"OrigDescr":null,"Comments":null,"ReleaseDate":null,"ReleaseDate0":null,"OrigDescrLang":null,"EmbargoDate":null,"OrigDescrLangNL":null,"OrigLangCode":null,"OrigLangCodeExtended":null,"OrigLangID":null,"DescrCompFlag":null,"DescrTransFlag":null,"Citation":"Aarestrup, K.; Thorstad, EB.; Koed, A.; Svendsen, JC.; Jepsen, N.; Pedersen, MI.; &nbsp;Økland, F.; (2004) Acoustic receiver array in the Gudena River, Denmark, from 2005-2005","AccessConstraints":null,"UDate":"2025-05-07","CDate":"2025-05-07","CurrencyDate":null,"RevisionDate":null,"DateLastModified":{"date":"2025-07-02 08:33:20.512335","timezone_type":1,"timezone":"+02:00"},"CheckedFlag":0,"PublicFlag":1,"VlizCoreFlag":1,"MarineFlag":0,"FreshFlag":1,"BrackishFlag":0,"TerrestrialFlag"