      string: '{"datasetrec":{"DasID":6333,"Acronym":"2013_Foyle","StandardTitle":"Freshwater
        and coastal migration patterns in the silver-stage eel Anguilla anguilla","OrigTitle":null,"OrigTitleLangID":null,"OrigTitleLangCode":null,"OrigTitleLang":null,"OrigTitleLangNL":null,"VersionName":null,"ContactEmail":null,"VersionDate":null,"VersionDay":null,"VersionMonth":null,"VersionYear":null,"SizeReference":null,"EngAbstract":"The
        unimpeded downstream movement patterns and migration success of small female
        and male Anguilla anguilla through a catchment in north-west Europe were studied
        using an acoustic hydrophone array along the River Finn and into the Foyle
        Estuary in Ireland.","EngDescr":"The unimpeded downstream movement patterns
        and migration success of small female and male Anguilla anguilla through a
        catchment in north-west Europe were studied using an acoustic hydrophone array
        along the River Finn and into the Foyle Estuary in Ireland. Twenty silver-stage
        A. anguilla were trapped 152 km upstream from a coastal marine sea-lough outlet
        and internally tagged with acoustic transmitters of which 19 initiated downstream
        migration. Migration speed was highly influenced by river flow within the
        freshwater compartment. Anguilla anguilla activity patterns were correlated
        with environmental influences; light, tidal direction and lunar phase all
        influenced the initiation of migration of tagged individuals. Migration speed
        varied significantly between upstream and lower river compartments. Individuals
        migrated at a slower speed in transitional water and sea-lough compartments
        compared with the freshwater compartment. While 88.5% survival was recorded
        during migration through the upper 121 km of the river and estuary, only 26%
        of A. anguilla which initiated downstream migration were detected at the outermost
        end of the acoustic array. Telemetry equipment functioned efficiently, including
        in the sea-lough, so this suggests high levels of mortality during sea-lough
        migration, or less likely, long-term sea-lough residence by silver A. anguilla
        emigrants. This has important implications for eel management plans.","OrigAbstract":null,"OrigDescr":null,"Comments":null,"ReleaseDate":null,"ReleaseDate0":null,"OrigDescrLang":null,"EmbargoDate":"2017-07-01","OrigDescrLangNL":null,"OrigLangCode":null,"OrigLangCodeExtended":null,"OrigLangID":null,"DescrCompFlag":0,"DescrTransFlag":0,"Citation":"Barry,
