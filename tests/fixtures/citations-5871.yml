    body:
      string: '{"datasetrec":{"DasID":5871,"Acronym":null,"StandardTitle":"2014_DEMER
        - Acoustic telemetry data for four fish species in the Demer river (Belgium)","OrigTitle":null,"OrigTitleLangID":null,"OrigTitleLangCode":null,"OrigTitleLang":null,"OrigTitleLangNL":null,"VersionName":null,"ContactEmail":null,"VersionDate":null,"VersionDay":null,"VersionMonth":null,"VersionYear":null,"SizeReference":null,"EngAbstract":"This
        is an acoustic telemetry dataset published by the Research Institute for Nature
        and Forest (INBO). It contains animal (fish) tracking data collected by the
        Permanent Belgian Acoustic Receiver Network <a href=\"https://lifewatch.be/en/fish-acoustic-receiver-network\">(https://lifewatch.be/en/fish-acoustic-receiver-network)</a>
        for the project/study 2014_demer, using VEMCO tags (V7, V13) and receivers
        (VR2W). In total 16 adult individuals of four local wild fish species (<i>Petromyzon
        marinus</i>, <i>Rutilus rutilus</i>, <i>Silurus glanis</i>, <i>Squalius cephalus</i>)
        were captured, tagged and released in 2014, to study the effect of a specific
        barrier on their upstream/downstream migration in the Demer basin.","EngDescr":"<p>Longitudinal
        and lateral connectivity of rivers is necessary for fish to successfully fulfill
        their life cycle. In Flanders, fish are obstructed in their essential free
        migrations by weirs, sluices, mills, and pumping stations, which are needed
        to control the water level. The Demer river drains the eastern part of the
        Scheldt basin. Fish migrating from the sea to the Demer river are obstructed
        by three hydraulic constructions. In this study we aimed to evaluate the possibilities
        for fish migration around the most upstream of these three constructions,
        the Grote Steunbeer in the city of Diest. Therefore, behaviour of two sea
        lamprey (<i>Petromyzon marinus</i>), two roach (<i>Rutilus rutilus</i>), nine
        Wels catfish (<i>Silurus glanis</i>) and three chub (<i>Squalius cephalus</i>)
        was investigated by acoustic telemetry in the areas up-, downstream and around
        the fish migration barrier. The results indicated that free upstream fish
        migration in the Demer river is obstructed by the Grote Steunbeer barrier
        in its current state, and that adaptations to this barrier should get priority
        as the tributary of the Zwarte beek only partly offers an alternative route
        for fish to qualitative spawning habitats upstream.</p><br/>\r\n\r\nThis dataset
        was collected using infrastructure provided by VLIZ and INBO funded by the
        Research Foundation - Flanders (FWO) as part of the Belgian contribution to
        LifeWatch. The study was commissioned by the Flemish Environment Agency (VMM).
        Data were exported from the European Tracking Network data portal (<a href=\"http://www.lifewatch.be/etn\">http://www.lifewatch.be/etn</a>)
        developed by VLIZ using the ETN R package (<a href=\"https://inbo.github.io/etn/\">https://inbo.github.io/etn/</a>)
        developed by INBO. Field definitions can be found at <a href=\"https://inbo.github.io/etn/articles/etn_fields.html\">https://inbo.github.io/etn/articles/etn_fields.html</a>.</p>","OrigAbstract":null,"OrigDescr":null,"Comments":null,"ReleaseDate":"Nov
