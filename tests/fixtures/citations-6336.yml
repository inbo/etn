            {"datasetrec":{"DasID":6336,"Acronym":"2011_Loire","StandardTitle":"Migration behaviour of silver eels (<i>Anguilla anguilla</i>) in a large estuary of Western Europe inferred from acoustic telemetry","OrigTitle":null,"OrigTitleLangID":null,"OrigTitleLangCode":null,"OrigTitleLang":null,"OrigTitleLangNL":null,"VersionName":null,"ContactEmail":null,"VersionDate":null,"VersionDay":null,"VersionMonth":null,"VersionYear":null,"SizeReference":null,"EngAbstract":"<p>Despite intensive research on eels, the behaviour of silver eels in estuaries during their migration remains poorly documented which creates serious gaps in planning the restoration of the European eel population. Estuaries are complex environments that can be exposed to large human pressures which could impede, delay migration or impact fish reproductive potential. This study investigated the estuarine migration of female silver eels in the Loire River using an acoustic telemetry system. An array of 31 hydrophones was deployed in the Loire estuary and 51 female seaward migrants were tagged with acoustic transmitters and released 20 km upstream of the estuary, at 100 km from the river mouth. 94% of the silver eels could be followed down to the river mouth. Mean global estuarine speed was 4.5 km days 1, i.e., 0.05 m s 1 and residence times varied significantly between upstream and lower compartments. Mean directional migration speed was found to be 48.6 km days 1, i.e., 0.56 m s 1, and appeared correlated with total length and body weight. Also, daily escapement rate was highly influenced by river flow.</p>","EngDescr":null,"OrigAbstract":null,"OrigDescr":null,"Comments":null,"ReleaseDate":null,"ReleaseDate0":null,"OrigDescrLang":null,"EmbargoDate":"2015-11-11","OrigDescrLangNL":null,"OrigLangCode":null,"OrigLangCodeExtended":null,"OrigLangID":null,"DescrCompFlag":0,"DescrTransFlag":0,"Citation":"Bultel, E.; Lasne, E.; Acou, .A.; Guillaudeau, J.; Bertier, C.; Feunteun, E.; (2014) Migration behaviour 