        Telemetry","ThesTypID":30,"ThesType":"ETN Context","Code":null,"Description":"Acoustic
        telemetry uses acoustic signals (also called ‘pings’) which propagate into
        the water, and are detected by acoustic receivers","OrigThesTerm":"Acoustic
