    body:
      string: '{"datasetrec":{"DasID":5880,"Acronym":null,"StandardTitle":"Partly
        temporarily acoustic receiver network and partly permanent acoustic receiver
        network to assess diadromous fish migration in the Scheldt river basin, Belgium.","OrigTitle":null,"OrigTitleLangID":null,"OrigTitleLangCode":null,"OrigTitleLang":null,"OrigTitleLangNL":null,"VersionName":null,"ContactEmail":null,"VersionDate":null,"VersionDay":null,"VersionMonth":null,"VersionYear":null,"SizeReference":null,"EngAbstract":"This
        study aimed the evaluation of this fish migration position and if fish could
        pass the weir, by acoustic telemetry. A total of 35 fish were tagged of 5
        different species and 2 hybrids: common carp (Cyprinus carpio), Wels catfish
        (Silurus glanis), European flounder (Platichthys flesus), roach (Rutilus rutilus),
        European eel (Anguilla anguilla), roach x rudd and roach x bream. We evaluated
        individual fish behaviour up-, downstream and near the weir and evaluatied
        if and when fish passed the weir.","EngDescr":"Longitudinal and lateral connectivity
        of rivers is necessary for fish to successfully fulfill their life cycle.
        In Flanders, fish are obstructed in their essential free migrations by weirs,
        sluices, mills, pumping stations, …, which are needed to control the water
        level. The weir on the river Dijle upstream of Mechelen formed partially a
        physical barrier for the upstream migration of fish to the upstream part of
        the Dijle basin and the total of the Demer basin. An attempt has been made
        to resolve the shortcommings of the weir as migration obstruction, by the
        setting of a fish migration position.\r\n\r\nResults showed that 21 of 35
        fish were able to pass the weir at specific hydrological conditions and weir
        management options. The number of passages differed between species, but happened
        always in the periods that higher passage could be expected following their
        lifestyle.  The study indicates the importance and benefits of a fish-friendly
        weir management. Next, a part of the receiver network of this study is maintained
        after the end of this study, to enable the tracking of large migratory species,
        such as eel and shad, which live and spawn, respectively, in the Scheldt river
        basin up to the rivers Dijle and Nete (confluencing in the river Rupel, which
        is a major tributary of the river Scheldt).","OrigAbstract":null,"OrigDescr":null,"Comments":null,"ReleaseDate":null,"ReleaseDate0":null,"OrigDescrLang":null,"EmbargoDate":null,"OrigDescrLangNL":null,"OrigLangCode":null,"OrigLangCodeExtended":null,"OrigLangID":null,"DescrCompFlag":0,"DescrTransFlag":0,"Citation":null,"AccessConstraints":null,"UDate":"2018-03-01","CDate":"2018-01-03","CurrencyDate":null,"RevisionDate":null,"DateLastModified":{"date":"2026-06-09
