        European Tracking Network is a pan-European biotelemetry network that aims
        at the integration of regional telemetry initiatives into a sustainable, efficient
        and integrated network embedded in the international context. Data is integrated
        in the ETN data system that is part of the ETN virtual lab developed by LifeWatch.","License":"https://creativecommons.org/licenses/by/4.0/","StandardTitle":"European
        Tracking Network (ETN) data","doi":null,"vlizDoi":null},{"DasID":5250,"Acronym":null,"EngAbstract":"As
        part of the Belgian LifeWatch observatory, a permanent acoustic receiver network
        for fish tracking is established in the Belgian Part of the North Sea and
        the Western Scheldt. Using acoustic telemetry distribution, movements and
        habitat use of tagged migratory fish can be tracked. Tags or transmitters
        are surgically implanted in the belly of individual fish. When swimming in
        the vicinity of an acoustic receiver (Vemco), the information of the unique
        ID-code of the transmitter is stored on the receiver together with an exact
        timing of the event. When signals are simultaneously received by multiple
        receivers, an exact positioning of the tagged individuals can be derived from
        the raw data. In total 40 transmitters are implanted and 51 acoustic receivers
        are installed on buoys and other platforms.","License":"https://creativecommons.org/licenses/by/4.0/","StandardTitle":"LifeWatch
