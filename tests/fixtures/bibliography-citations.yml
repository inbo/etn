    body:
      string: '{"datasetrec":{"DasID":5846,"Acronym":"2010_PHD_REUBENS","StandardTitle":"Acoustic
        telemetry data for Atlantic cod (Gadus morhua) in the C-Power wind farm in
        the southern North Sea (Belgium)","OrigTitle":null,"OrigTitleLangID":null,"OrigTitleLangCode":null,"OrigTitleLang":null,"OrigTitleLangNL":null,"VersionName":null,"ContactEmail":null,"VersionDate":null,"VersionDay":null,"VersionMonth":null,"VersionYear":null,"SizeReference":null,"EngAbstract":"This
        is an acoustic telemetry dataset published by Ghent University. It contains
        animal (fish) tracking data collected by what later became the Permanent Belgian
        Acoustic Receiver Network <a href=\"https://lifewatch.be/en/fish-acoustic-receiver-network\">
        (https://lifewatch.be/en/fish-acoustic-receiver-network)</a> for the project/study
        2010_phd_Reubens, using VEMCO tags (V9) and receivers (VR2W). In total 41
        individuals of Atlantic cod (<i>Gadus morhua</i>) were captured, tagged and
        released in 2010 and 2011 in the C-Power wind farm in the Belgian part of
        the North Sea, to study their movement behaviour and assess the impacts of
        offshore wind farms on their movement ecology. This dataset also includes
        the data of the synchronisation tags present in the study. To calculate exact
        2D positions using acoustic telemetry, the time difference of arrival of signals
        at different receivers is used. Therefore sync tags are needed to account
        for clock drift in the receivers.","EngDescr":"<p>Intensive exploitation of
        the marine environment by mankind can alter the natural habitat of marine
        organisms drastically. The addition of artificial hard substrates (e.g. offshore
        wind turbines) to soft-sediment sandy bottoms is a pervasive example of an
        anthropogenic habitat change. In this study, we assess the influence of offshore
        wind farms on the spatio-temporal movement ecology of Atlantic cod (<i>Gadus
        morhua</i>). The results of this study will be useful for management measures
        for the conservation and restoration of the cod population.</p><br/>\r\n\r\n<p>This
        study was funded by Research Foundation - Flanders (FWO). Data were exported
        from the European Tracking Network data portal <a href=\"http://www.lifewatch.be/etn\">
        (http://www.lifewatch.be/etn) </a> developed by VLIZ using the ETN R package
        <a href=\"https://inbo.github.io/etn/\"> (https://inbo.github.io/etn/) </a>
        developed by INBO. Field definitions can be found at <a href=\"https://inbo.github.io/etn/articles/etn_fields.html\">https://inbo.github.io/etn/articles/etn_fields.html</a>.</p>","OrigAbstract":null,"OrigDescr":null,"Comments":null,"ReleaseDate":"Aug
        26 2024 12:00AM","ReleaseDate0":"2024-08-26","OrigDescrLang":null,"EmbargoDate":null,"OrigDescrLangNL":null,"OrigLangCode":null,"OrigLangCodeExtended":null,"OrigLangID":null,"DescrCompFlag":0,"DescrTransFlag":0,"Citation":"Reubens,
