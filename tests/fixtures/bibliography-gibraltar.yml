        receiver array to study predator movescapes in Southwestern Portugal for the
        MOVE project","OrigTitle":null,"OrigTitleLangID":null,"OrigTitleLangCode":null,"OrigTitleLang":null,"OrigTitleLangNL":null,"VersionName":null,"ContactEmail":null,"VersionDate":null,"VersionDay":null,"VersionMonth":null,"VersionYear":null,"SizeReference":null,"EngAbstract":"<p>The
        existing European network of Marine Protected Areas (MPAs) mainly consists
        of small, isolated zones, often inadequately designed to account for the mobility
        and ecological fitness of predatory fish. MOVE seeks to address this by evaluating
        the movement patterns—or \"movescapes\"—of these species, providing crucial
        data for the design of more effective, connected MPA networks. MOVE''s primary
        goal is to improve the conservation and sustainability of coastal predatory
        fish populations across Europe, thereby strengthening the resilience of coastal
        social-ecological systems. By mapping movement patterns and assessing ecological
        connections, the project will provide actionable insights to inform MPA management
        and broader conservation strategies.</p><p>This dataset contains the detections
        and deployment locations of these acoustic telemetry receivers.</p>","EngDescr":null,"OrigAbstract":null,"OrigDescr":null,"Comments":null,"ReleaseDate":null,"ReleaseDate0":null,"OrigDescrLang":null,"EmbargoDate":null,"OrigDescrLangNL":null,"OrigLangCode":null,"OrigLangCodeExtended":null,"OrigLangID":null,"DescrCompFlag":null,"DescrTransFlag":null,"Citation":"Horta
