      string: '{"datasetrec":{"DasID":5877,"Acronym":"2011_Bovenschelde","StandardTitle":"Temporarily
        acoustic receiver network in the Upper Scheldt river, for river lamprey tracking
        in the Scheldt river basin","OrigTitle":null,"OrigTitleLangID":null,"OrigTitleLangCode":null,"OrigTitleLang":null,"OrigTitleLangNL":null,"VersionName":null,"ContactEmail":null,"VersionDate":null,"VersionDay":null,"VersionMonth":null,"VersionYear":null,"SizeReference":null,"EngAbstract":"In
        2011 and 2012 forty-one adult river lamprey were followed during their upstream
        migration in the tidal and\/or non-tidal part of the River Scheldt and its
        tributaries using acoustic telemetry (Vemco technology: V7 and V8 transmitters;
        VR2 and VR2W data loggers). The migration patterns in the river catchment
        and their behaviour at a tidal barrier, lock-weir complexes and fish bypasses
        (passage timing and delay) show that the disrupted water management of the
        river and in consequence of its barriers and bypasses are the key to (un)successful
        spawning migration in the catchment.","EngDescr":"The disruption of longitudinal
        and lateral connectivity of rivers has led to ecological catastrophes such
        as the extinction of several diadromous fish species. River lamprey is an
        important indicator species for the integrity of ecosystems and connectivity
        within and between catchment areas. In the highly fragmented River Scheldt
        basin first restoration actions are undertaken, such as the building of nature-like
        bypasses.","OrigAbstract":null,"OrigDescr":null,"Comments":null,"ReleaseDate":null,"ReleaseDate0":null,"OrigDescrLang":null,"EmbargoDate":null,"OrigDescrLangNL":null,"OrigLangCode":null,"OrigLangCodeExtended":null,"OrigLangID":null,"DescrCompFlag":0,"DescrTransFlag":0,"Citation":null,"AccessConstraints":null,"UDate":"2024-07-02","CDate":"2018-01-03","CurrencyDate":null,"RevisionDate":null,"DateLastModified":{"date":"2026-04-03
